<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="86mm" height="54mm"
     viewBox="0 0 86 54">

  <!-- Card boundary (not engraved — for alignment only) -->
  <rect x="0" y="0" width="86" height="54"
        fill="none" stroke="#cccccc" stroke-width="0.1" />

  <!-- Variety Name (large, centered) -->
  <text x="43.0" y="7"
        font-family="Arial, Helvetica, sans-serif"
        font-size="4.5" font-weight="bold"
        text-anchor="middle" fill="black">Niagara Grape</text>

  <!-- Type (centered, below name) -->
  <text x="43.0" y="12.5"
        font-family="Arial, Helvetica, sans-serif"
        font-size="3.2" font-style="italic"
        text-anchor="middle" fill="black">Grape</text>

  <!-- Separator line -->
  <line x1="3" y1="15" x2="83" y2="15"
        stroke="black" stroke-width="0.2" />

  <!-- Detail fields (centered) -->
  <text x="43.0" y="19"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.8" text-anchor="middle" fill="black">Bloom: Midseason</text>

  <text x="43.0" y="24"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.8" text-anchor="middle" fill="black">Harvest: Midseason</text>

  <text x="43.0" y="29"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.8" text-anchor="middle" fill="black">Fertility: Self-fertile</text>

  <text x="43.0" y="34"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.8" text-anchor="middle" fill="black">Use: Eating Fresh</text>

  <text x="43.0" y="39"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.8" text-anchor="middle" fill="black">Origin: 1800`s</text>

  <!-- Separator line -->
  <line x1="3" y1="42" x2="83" y2="42"
        stroke="black" stroke-width="0.2" />

  <!-- Year Planted (centered) -->
  <text x="43.0" y="46"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.8" font-weight="bold"
        text-anchor="middle" fill="black">Planted: 2025</text>

  <!-- Footer (centered) -->
  <text x="43.0" y="51"
        font-family="Arial, Helvetica, sans-serif"
        font-size="2.5"
        text-anchor="middle" fill="black">Planted by: Peter Brown &amp; Robyn Seely</text>

</svg>